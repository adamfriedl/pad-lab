# Build and push the pipeline image (BuildKit registry cache).
# Triggered on main by infra/cloudbuild_trigger.tf (pipeline path filter).
# Manual: ./scripts/build_image.sh

substitutions:
  _REGION: us-central1
  _IMAGE: us-central1-docker.pkg.dev/${PROJECT_ID}/pad-lab/pipeline:latest
  _CACHE: us-central1-docker.pkg.dev/${PROJECT_ID}/pad-lab/pipeline:buildcache

options:
  logging: CLOUD_LOGGING_ONLY

steps:
  - name: gcr.io/cloud-builders/docker
    entrypoint: bash
    args:
      - -c
      - |
        set -euo pipefail
        docker buildx create --name pad-lab-builder --use 2>/dev/null \
          || docker buildx use pad-lab-builder
        docker buildx build \
          --cache-from "type=registry,ref=${_CACHE}" \
          --cache-to "type=registry,ref=${_CACHE},mode=max" \
          -t "${_IMAGE}" \
          --push \
          .

timeout: 1800s
