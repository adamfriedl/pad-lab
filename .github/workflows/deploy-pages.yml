name: Deploy dashboard to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'viz/**'
      - '.github/workflows/deploy-pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: viz/package-lock.json
      - name: Install and build
        working-directory: viz
        env:
          # Repo variable, or default to this project's viz bucket.
          VITE_DATA_BASE_URL: ${{ vars.VITE_DATA_BASE_URL || 'https://storage.googleapis.com/pad-lab-gcp-lab-497423-viz/' }}
        run: |
          npm ci
          npm run build
      - uses: actions/upload-pages-artifact@v5
        with:
          path: viz/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
