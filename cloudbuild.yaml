# Build pipeline image (layer cache from Artifact Registry) and optionally run the job.
# Manual:  ./scripts/run_job.sh  (local source via gcloud builds submit)
# Schedule: Cloud Scheduler → this file on GitHub (see infra/cloud_run.tf)

substitutions:
  _REGION: us-central1
  _IMAGE: us-central1-docker.pkg.dev/${PROJECT_ID}/pad-lab/pipeline:latest
  _JOB: pad-lab-pipeline
  _RUN_JOB: "true"

options:
  logging: CLOUD_LOGGING_ONLY

steps:
  - name: gcr.io/cloud-builders/docker
    entrypoint: bash
    args:
      - -c
      - |
        set -euo pipefail
        docker pull "${_IMAGE}" || true
        docker build --cache-from="${_IMAGE}" -t "${_IMAGE}" .
        docker push "${_IMAGE}"

  - name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    entrypoint: bash
    args:
      - -c
      - |
        if [ "${_RUN_JOB}" = "true" ]; then
          gcloud run jobs execute "${_JOB}" \
            --project="${PROJECT_ID}" \
            --region="${_REGION}" \
            --wait
        fi

timeout: 1800s
